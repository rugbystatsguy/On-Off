<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NR Fellows Status Tracker</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.container {
    width: 95%;
    max-width: 500px;
    margin-top: 20px;
}

h2 {
    text-align: center;
}

/* Top status buttons row */
.status-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: space-between;
    margin-bottom: 15px;
}

.status-buttons button {
    flex: 1 1 48%;
    padding: 18px;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.on-station { background-color: #2ecc71; color: white; }
.off-station { background-color: #e74c3c; color: white; }
.on-duty { background-color: #3498db; color: white; }
.off-duty { background-color: #f39c12; color: white; }

.summary {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-top: 15px;
    max-height: 250px;
    overflow-y: auto;
    font-size: 13px; /* Smaller text to fit date + time */
}

.entry {
    padding: 5px 0;
    border-bottom: 1px solid #eee;
    white-space: nowrap; /* Keeps everything on one line */
}

/* Bottom row buttons */
.bottom-buttons {
    display: flex;
    justify-content: center;
    gap: 120px;
    margin-top: 20px;
    margin-bottom: 40px;
}

.bottom-buttons button {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 0;
    border: none;
    cursor: pointer;
}

.clear-btn {
    background-color: red;
    color: white;
}

.whatsapp {
    background-color: #25D366;
}

.whatsapp img,
.clear-btn img {
    width: 40px;
    height: 40px;
}
</style>
</head>

<body>

<div class="container">
    <h2>NR Fellows Status</h2>

    <div class="status-buttons">
        <button class="on-station" onclick="recordStatus('NR Fellows on station')">ON STATION</button>
        <button class="off-station" onclick="recordStatus('NR Fellows off station')">OFF STATION</button>
        <button class="on-duty" onclick="recordStatus('NR Fellows on station and on duty')">ON DUTY</button>
        <button class="off-duty" onclick="recordStatus('NR Fellows off station and off duty')">OFF DUTY</button>
    </div>

    <div class="summary" id="summaryBox"></div>

    <div class="bottom-buttons">
        <button class="whatsapp" onclick="shareLastEntry()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
        </button>
        <button class="clear-btn" onclick="clearSummary()">
            <img src="https://cdn-icons-png.flaticon.com/512/1214/1214428.png" alt="Delete">
        </button>
    </div>
</div>

<script>
let entries = JSON.parse(localStorage.getItem("nrFellowsEntries")) || [];

function getCurrentTime() {
    const now = new Date();
    return now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}

function getCurrentDate() {
    const now = new Date();
    const day = String(now.getDate()).padStart(2, '0');
    const month = String(now.getMonth() + 1).padStart(2, '0');
    return `${day}/${month}`;
}

function recordStatus(message) {
    const time = getCurrentTime();
    const date = getCurrentDate();

    const displayEntry = `${date} ${time} - ${message}`; // For summary
    const shareEntry = `${time} - ${message}`; // For WhatsApp only

    entries.push({ display: displayEntry, share: shareEntry });
    localStorage.setItem("nrFellowsEntries", JSON.stringify(entries));
    displayEntries();
}

function displayEntries() {
    const summaryBox = document.getElementById("summaryBox");
    summaryBox.innerHTML = "";
    entries.forEach(item => {
        const div = document.createElement("div");
        div.className = "entry";
        div.textContent = item.display;
        summaryBox.appendChild(div);
    });
}

function shareLastEntry() {
    if (entries.length === 0) {
        alert("No entry to share.");
        return;
    }
    const lastEntry = entries[entries.length - 1].share;
    const whatsappURL = `https://wa.me/?text=${encodeURIComponent(lastEntry)}`;
    window.open(whatsappURL, "_blank");
}

function clearSummary() {
    if (confirm("Clear all entries?")) {
        entries = [];
        localStorage.removeItem("nrFellowsEntries");
        displayEntries();
    }
}

displayEntries();
</script>

</body>
</html>
